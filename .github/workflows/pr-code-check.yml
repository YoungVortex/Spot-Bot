name: PR Code Safety Check

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-check:
    name: Security & Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install safety bandit

      - name: Check for dangerous code patterns
        run: |
          echo "=== Scanning for dangerous patterns ==="
          FOUND=0

          # Dangerous Python functions
          PATTERNS=(
            "eval\("
            "exec\("
            "compile\("
            "__import__\("
            "os\.system\("
            "os\.popen\("
            "subprocess\.call\(.*shell=True"
            "subprocess\.Popen\(.*shell=True"
            "subprocess\.run\(.*shell=True"
            "pickle\.loads\("
            "pickle\.load\("
            "yaml\.load\([^)]*\)"
            "marshal\.loads\("
            "shelve\.open\("
            "input\([^)]*\)"
            "exec\(input"
            "compile\(input"
            "requests\.get\([^)]*verify\s*=\s*False"
            "urllib\.request\.urlopen"
            "socket\.connect"
          )

          DESCRIPTIONS=(
            "eval() - arbitrary code execution"
            "exec() - arbitrary code execution"
            "compile() - dynamic code compilation"
            "__import__() - dynamic import"
            "os.system() - shell command execution"
            "os.popen() - shell command execution"
            "subprocess with shell=True"
            "subprocess.Popen with shell=True"
            "subprocess.run with shell=True"
            "pickle.loads() - insecure deserialization"
            "pickle.load() - insecure deserialization"
            "yaml.load() without SafeLoader"
            "marshal.loads() - insecure deserialization"
            "shelve.open() - insecure deserialization"
            "input() - check for code injection"
            "exec(input()) - direct code injection"
            "compile(input()) - direct code injection"
            "requests with verify=False - TLS bypass"
            "urllib.request.urlopen - SSRF risk"
            "socket.connect - raw network access"
          )

          for i in "${!PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.rb" --include="*.php" \
              -E "${PATTERNS[$i]}" . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo ""
              echo "!!! FOUND: ${DESCRIPTIONS[$i]}"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "=== Dangerous patterns found. Failing check. ==="
            exit 1
          fi

          echo "No dangerous patterns found."

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          FOUND=0

          SECRET_PATTERNS=(
            "(api[_-]?key|apikey)\s*[:=]\s*['\"][A-Za-z0-9]{16,}['\"]"
            "(secret[_-]?key|client[_-]?secret)\s*[:=]\s*['\"][A-Za-z0-9]{16,}['\"]"
            "(password|passwd|pwd)\s*[:=]\s*['\"][^'\"]{6,}['\"]"
            "(access[_-]?token|auth[_-]?token)\s*[:=]\s*['\"][A-Za-z0-9._-]{20,}['\"]"
            "(private[_-]?key)\s*[:=]\s*['\"]-----BEGIN"
            "(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY)\s*[:=]\s*['\"][A-Za-z0-9]{16,}['\"]"
            "ghp_[A-Za-z0-9]{36}"
            "sk-[A-Za-z0-9]{32,}"
            "xox[baprs]-[A-Za-z0-9-]+"
            "(bearer|Bearer)\s+[A-Za-z0-9._-]{20,}"
          )

          DESCRIPTIONS=(
            "API Key"
            "Secret Key / Client Secret"
            "Hardcoded password"
            "Access Token / Auth Token"
            "Private Key"
            "AWS credentials"
            "GitHub PAT"
            "OpenAI API key"
            "Slack token"
            "Bearer token"
          )

          for i in "${!SECRET_PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.env" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.cfg" --include="*.ini" --include="*.conf" \
              -iE "${SECRET_PATTERNS[$i]}" . 2>/dev/null | grep -v "\.github/" | grep -v "node_modules/" | grep -v "__pycache__/" || true)
            if [ -n "$MATCHES" ]; then
              echo ""
              echo "!!! FOUND: ${DESCRIPTIONS[$i]}"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "=== Hardcoded secrets found! This is a SECURITY RISK. ==="
            echo "Please use environment variables or a secrets manager."
            exit 1
          fi

          echo "No hardcoded secrets found."

      - name: Check for .env file commits
        run: |
          echo "=== Checking for .env file in repo ==="
          if [ -f ".env" ]; then
            echo "!!! .env file found in repository!"
            echo "Add .env to .gitignore immediately."
            exit 1
          fi
          echo "No .env file found."

      - name: Check for dangerous file permissions
        run: |
          echo "=== Checking for world-writable files ==="
          FOUND=0
          while IFS= read -r -d '' file; do
            if [ -w "$file" ] && [ "$(stat -c '%a' "$file" 2>/dev/null)" = "777" ]; then
              echo "!!! World-writable file: $file"
              FOUND=1
            fi
          done < <(find . -type f -not -path "./.git/*" -not -path "./node_modules/*" -print0 2>/dev/null)

          if [ "$FOUND" -eq 1 ]; then
            echo "=== Fix file permissions ==="
            exit 1
          fi

          echo "File permissions OK."

      - name: Check for suspicious network patterns
        run: |
          echo "=== Checking for suspicious outbound connections ==="
          FOUND=0

          NETWORK_PATTERNS=(
            "0\.0\.0\.0"
            "127\.0\.0\.1.*production"
            "localhost.*api.*token"
            "ngrok\.io"
            "serveo\.net"
            "localtunnel"
            "webhook\.site"
            "requestbin"
            "pipedream"
            "burpcollaborator"
            "interact\.sh"
          )

          for pattern in "${NETWORK_PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" --include="*.yaml" \
              -E "$pattern" . 2>/dev/null | grep -v "\.github/" | grep -v "node_modules/" || true)
            if [ -n "$MATCHES" ]; then
              echo ""
              echo "!!! Suspicious network pattern: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "=== Suspicious network patterns found ==="
            exit 1
          fi

          echo "No suspicious network patterns found."

      - name: Bandit security scan
        run: |
          bandit -r . -f json -o bandit-report.json --skip B101,B001 \
            --exclude ./.git,./.github,./node_modules 2>/dev/null || true

          if [ -f bandit-report.json ]; then
            HIGH=$(python3 -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          high = [r for r in results if r.get('issue_severity') == 'HIGH']
          for r in high:
              print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']}\")
          print(len(high))
          " 2>/dev/null || echo "0")

            COUNT=$(echo "$HIGH" | tail -1)
            echo "$HIGH" | head -n -1

            if [ "$COUNT" != "0" ]; then
              echo ""
              echo "=== Bandit found $COUNT HIGH severity issues ==="
              exit 1
            fi
          fi

          echo "Bandit scan passed."

      - name: Check for unsafe file operations
        run: |
          echo "=== Checking for unsafe file operations ==="
          FOUND=0

          UNSAFE_PATTERNS=(
            "open\(.*['\"]w['\"]"
            "chmod\s+777"
            "rm\s+-rf\s+/"
            "shutil\.rmtree"
            "os\.remove"
            "os\.unlink"
          )

          for pattern in "${UNSAFE_PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.py" --include="*.js" --include="*.ts" \
              -E "$pattern" . 2>/dev/null | grep -v "\.github/" | grep -v "node_modules/" | grep -v "__pycache__/" || true)
            if [ -n "$MATCHES" ]; then
              echo ""
              echo "!!! Unsafe file operation: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "=== Unsafe file operations found (review needed) ==="
            exit 1
          fi

          echo "File operations OK."

      - name: Final summary
        if: success()
        run: |
          echo ""
          echo "============================================"
          echo "  ALL SECURITY CHECKS PASSED"
          echo "============================================"
          echo ""
          echo "Checks performed:"
          echo "  - Dangerous code patterns"
          echo "  - Hardcoded secrets"
          echo "  - .env file exposure"
          echo "  - File permissions"
          echo "  - Suspicious network patterns"
          echo "  - Bandit security scan"
          echo "  - Unsafe file operations"
          echo ""
